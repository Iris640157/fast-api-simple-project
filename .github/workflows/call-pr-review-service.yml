# Everything is done by pr_automation_system: fetch PR, ensure KB, review, post comment.
# CI passes repo_id, pr_number, and token in header (service does not need GITHUB_TOKEN in .env; multi-account safe). Add secret REVIEW_SERVICE_URL.

name: PR Review (via service)

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Request review (service fetches PR, ensures KB, reviews, posts comment)
        env:
          REVIEW_SERVICE_URL: ${{ secrets.REVIEW_SERVICE_URL }}
          REPO_ID: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_TOKEN: ${{ secrets.REVIEW_GITHUB_TOKEN }}
        run: |
          if [ -z "$REVIEW_SERVICE_URL" ]; then
            echo "REVIEW_SERVICE_URL not set; skipping."
            exit 0
          fi
          
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "ERROR: GITHUB_TOKEN is empty. Add REVIEW_GITHUB_TOKEN secret or check permissions."
            exit 1
          fi

          # Use X-GitHub-Token (proxies like ngrok often strip Authorization)
          HTTP_CODE=$(curl -s -w "%{http_code}" -o /tmp/review_response.json -X POST "${REVIEW_SERVICE_URL%/}/review" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Token: $GITHUB_TOKEN" \
            -d "{\"repo_id\":\"$REPO_ID\",\"pr_number\":$PR_NUMBER}")
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "Review service returned HTTP $HTTP_CODE:"
            cat /tmp/review_response.json
            exit 1
          fi
          echo "Review completed (HTTP $HTTP_CODE)."
        continue-on-error: false
